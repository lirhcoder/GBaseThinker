# GBaseThinker 认知动词库
# 版本: 0.1.0
# 将汉语认知动词解构为可执行的思维程序

verbs:

  分析:
    decompose: [分, 析]
    meaning:
      分: "切割——将整体切割为部分"
      析: "剥离——剥离各部分的本质属性"
    procedure:
      - "确定分割维度（按什么标准切？）"
      - "执行切割，得到各部分"
      - "剥离每个部分的核心属性"
      - "检查部分间的关系（独立？依赖？冲突？）"
    preconditions: [有明确对象, 有至少一个切割维度]
    output: "结构化的部分清单 + 关系图"
    anti_patterns:
      - "只分不析（拆了不深入看）"
      - "析而不全（遗漏关键部分）"
      - "维度单一（只从一个角度切）"
    activation: "当需要理解一个复杂事物的内部构成时"

  理解:
    decompose: [理, 解]
    meaning:
      理: "梳理——找到脉络和结构"
      解: "解开——将纠缠的关系解开"
    procedure:
      - "找到对象的主要脉络（骨架是什么？）"
      - "沿脉络梳理分支"
      - "解开各分支之间的纠缠关系"
      - "验证：能否用自己的话重新组装？"
    preconditions: [有需要理解的对象, 接受暂时的困惑]
    output: "一个可以重新表述的心智模型"
    anti_patterns:
      - "理而不解（看到结构但不理解连接）"
      - "解而不理（理解细节但看不到全貌）"
      - "假理解（能复述但不能变形应用）"
    activation: "当面对一个不熟悉的概念或系统时"

  判断:
    decompose: [判, 断]
    meaning:
      判: "区分——划出边界，分清此与彼"
      断: "决定——在边界上做出选择"
    procedure:
      - "明确要判断的对象和维度"
      - "划出边界（什么算、什么不算）"
      - "在边界上做出决定"
      - "检查决定的依据是否充分"
    preconditions: [有明确的判断标准, 有足够的信息]
    output: "一个有理由的结论"
    anti_patterns:
      - "判而不断（分析了半天不做决定）"
      - "断而不判（不经分析就下结论）"
      - "标准模糊（边界不清晰导致判断漂移）"
    activation: "当需要对某事做出是非、好坏、取舍的决定时"

  思考:
    decompose: [思, 考]
    meaning:
      思: "召回——从记忆和联想中调取材料"
      考: "验证——检验调取的材料是否站得住"
    procedure:
      - "围绕问题展开联想，召回相关材料"
      - "对召回的材料进行筛选"
      - "验证每条材料的可靠性"
      - "将可靠材料组织成推理链"
    preconditions: [有明确的思考对象]
    output: "经过验证的推理链"
    anti_patterns:
      - "只思不考（只联想不验证，容易跑偏）"
      - "只考不思（只验证不联想，缺乏创造性）"
      - "思而不深（表面联想，不穿透）"
    activation: "任何需要动脑的场景（最基础的认知动词）"

  推理:
    decompose: [推, 理]
    meaning:
      推: "推进——从已知向未知推进"
      理: "梳理——保持推进过程有条理"
    procedure:
      - "确定起点（已知的是什么）"
      - "确定方向（要推向哪里）"
      - "选择推进方式（演绎？归纳？类比？）"
      - "每一步检查：逻辑链是否完整？有无跳跃？"
      - "到达终点后回头审查整条链"
    preconditions: [有已知前提, 有推理方向]
    output: "从前提到结论的完整逻辑链"
    anti_patterns:
      - "跳跃推理（中间步骤缺失）"
      - "循环推理（结论偷偷出现在前提中）"
      - "推而不理（推进但逻辑混乱）"
    activation: "当需要从已知推导出未知时"

  归纳:
    decompose: [归, 纳]
    meaning:
      归: "归类——将散乱的个例归到一起"
      纳: "收纳——提炼出共同的模式或规律"
    procedure:
      - "收集足够多的个例"
      - "寻找个例之间的共同特征"
      - "将共同特征提炼为一般规律"
      - "用新的个例测试规律是否成立"
      - "标注规律的适用边界"
    preconditions: [有多个个例, 个例之间有可比性]
    output: "一条一般规律 + 适用边界 + 反例清单"
    anti_patterns:
      - "样本不足就归纳（以偏概全）"
      - "只归不纳（分了类但没提炼规律）"
      - "忽略边界（把规律当成普适真理）"
    activation: "当看到多个个例，想找到背后的规律时"

  洞察:
    decompose: [洞, 察]
    meaning:
      洞: "穿透——穿过表面看到底层"
      察: "观察——仔细看清楚底层的模式"
    procedure:
      - "识别表面现象（大家看到的是什么）"
      - "追问：这个现象的生成机制是什么？"
      - "穿透到底层模式"
      - "验证：这个底层模式能否解释其他表面现象？"
      - "标注洞察的解释力边界"
    preconditions: [有足够的观察, 有穿透的意愿（不满足于表面解释）]
    output: "一个解释力强的底层模式 + 适用边界"
    anti_patterns:
      - "过度概括（一个例子就声称洞察）"
      - "穿凿附会（强行找深层原因）"
      - "洞而不察（穿透了但看不清楚）"
    activation: "当感觉表面解释不够，想找到更深层原因时"

  评论:
    decompose: [评, 论]
    meaning:
      评: "对照标准，给出判断（定性）"
      论: "展开论据，建立逻辑链（展开）"
    procedure:
      - "明确评价标准（用什么尺子量？）"
      - "将对象与标准对照，给出定性判断"
      - "为判断提供支撑论据"
      - "展开论据，形成逻辑链"
      - "考虑反面论据，回应可能的质疑"
    preconditions: [有明确对象, 有评价维度, 有基本了解]
    output: "判断 + 理由链 + 对反面论据的回应"
    anti_patterns:
      - "只评不论（武断——有判断没理由）"
      - "只论不评（无立场——只分析不下结论）"
      - "标准不明（不知道用什么在评）"
    activation: "当需要对某事物发表有立场的结构化意见时"

  质疑:
    decompose: [质, 疑]
    meaning:
      质: "质问——对准核心，提出直接的问题"
      疑: "怀疑——对答案保持不确定性"
    procedure:
      - "识别对方论点中最关键的假设"
      - "对准这个假设提出直接质问"
      - "不急于接受回答，保持怀疑"
      - "追问：如果这个假设不成立，结论会怎样？"
    preconditions: [有需要检验的论点, 有质疑的勇气]
    output: "一组指向核心假设的问题"
    anti_patterns:
      - "质而不疑（问了但不追究答案）"
      - "疑而不质（心里怀疑但不敢问）"
      - "质问边缘而非核心（抓不住重点）"
    activation: "当某个结论或建议感觉不够可靠时——这是 Thinker 的核心能力"

  反思:
    decompose: [反, 思]
    meaning:
      反: "反转——把视角掉转，看向自己"
      思: "思考——对自己的思考过程进行思考"
    procedure:
      - "暂停当前思维"
      - "将视角从'对象'转向'自己的思考过程'"
      - "检查：我在用什么框架？为什么选这个？"
      - "检查：我忽略了什么？什么假设没有明说？"
      - "检查：如果我错了，最可能错在哪里？"
    preconditions: [有刚完成的思考过程, 有自我审视的意愿]
    output: "对自己推理过程的审计报告"
    anti_patterns:
      - "反而不思（表面反省但不深入）"
      - "只反思失败不反思成功（不知道为什么对）"
      - "反思循环（无限自我审视，不做决定）"
    activation: "每次重要推理完成后——这是 Thinker 的免疫系统"
