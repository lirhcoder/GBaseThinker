# GBaseThinker 行动动词库
# 版本: 0.1.0
# 将汉语行动动词解构为可执行的操作程序

verbs:

  执行:
    decompose: [执, 行]
    meaning:
      执: "握住——抓住要做的事，不放手"
      行: "前行——一步步走下去"
    procedure:
      - "明确要执行的目标（握住什么）"
      - "分解为可行的步骤序列"
      - "按序逐步推进"
      - "每步完成后确认进度"
    preconditions: [有明确的执行目标, 有可分解的步骤]
    output: "目标的达成状态"
    anti_patterns:
      - "执而不行（抓住了但不动）——计划瘫痪"
      - "行而不执（动了但没抓住重点）——盲目行动"
      - "跳步执行（跳过关键步骤求快）"
    activation: "当需要将计划转化为行动时"

  构建:
    decompose: [构, 建]
    meaning:
      构: "构思——在脑中设计结构"
      建: "建造——将构思变成现实"
    procedure:
      - "明确要构建什么（目标物）"
      - "构思：设计结构、组件、关系"
      - "选择材料和工具"
      - "建造：按结构组装"
      - "验证：构建物是否符合构思"
    preconditions: [有构建目标, 有可用的材料/组件]
    output: "一个可运行/可使用的构建物"
    anti_patterns:
      - "只构不建（只设计不动手）"
      - "只建不构（不设计就动手）——结构混乱"
      - "过度构思（追求完美设计而不开始）"
    activation: "当需要创造一个新的系统、产品或结构时"

  优化:
    decompose: [优, 化]
    meaning:
      优: "选优——选择更好的"
      化: "转化——使之转变"
    procedure:
      - "定义'优'的标准（什么算更好？用什么度量？）"
      - "测量当前状态"
      - "找到改进空间最大的环节"
      - "设计转化方案"
      - "执行转化"
      - "再次测量，对比改进幅度"
    preconditions: [有明确的优化目标, 有可度量的指标, 有可改变的变量]
    output: "指标的可度量改善"
    anti_patterns:
      - "无标准优化（不知道什么算'优'就开始改）"
      - "局部优化（优化非瓶颈环节）"
      - "优化成瘾（已经够好了还在优化——边际收益递减）"
    activation: "当现有系统/方案需要改进时"

  设计:
    decompose: [设, 计]
    meaning:
      设: "设定——确定边界和约束"
      计: "谋划——在约束内寻找最优方案"
    procedure:
      - "明确设计的目标和用户"
      - "设定：列出约束条件（时间、资源、技术、用户需求）"
      - "计划：在约束内生成多个方案"
      - "评估方案，选择最优"
      - "细化选中方案到可执行级别"
    preconditions: [有设计目标, 有约束条件, 有评估标准]
    output: "一个可执行的方案"
    anti_patterns:
      - "无约束设计（什么都想要——不可能三角）"
      - "只设不计（定了约束但不想方案）"
      - "抄袭伪装成设计（直接复制而不理解约束差异）"
    activation: "当需要创造性地解决一个有约束的问题时"

  解决:
    decompose: [解, 决]
    meaning:
      解: "解开——将纠缠的问题拆开"
      决: "决断——切断问题的根源"
    procedure:
      - "识别问题的纠缠结构（什么和什么缠在一起）"
      - "解开：分离出独立的子问题"
      - "排序：哪个子问题是根源"
      - "决断：对根源问题做出行动"
      - "验证：纠缠是否真的解开了"
    preconditions: [有明确的问题, 问题是可拆解的]
    output: "问题被消除或降级到可接受水平"
    anti_patterns:
      - "解而不决（分析了半天不动手）"
      - "决而不解（不分析就动手——可能砍错地方）"
      - "治标不治本（解开了表面纠缠，根源还在）"
    activation: "当面对一个复杂的、纠缠的问题时"

  验证:
    decompose: [验, 证]
    meaning:
      验: "检验——用测试去检查"
      证: "证明——用证据去支撑"
    procedure:
      - "明确要验证的命题"
      - "设计检验方法（什么测试能证伪这个命题）"
      - "执行检验"
      - "收集证据"
      - "判断：证据是否足以支撑/推翻命题"
    preconditions: [有可证伪的命题, 有可执行的检验方法]
    output: "命题的验证状态 (confirmed / refuted / inconclusive)"
    anti_patterns:
      - "只验不证（跑了测试但不看结果）"
      - "确认偏误验证（只找支持的证据）"
      - "不可证伪的命题（怎么测都'对'——说明命题没有信息量）"
    activation: "当需要确认某个假设、方案或结论是否正确时"

  迭代:
    decompose: [迭, 代]
    meaning:
      迭: "更迭——一轮接一轮"
      代: "替代——新版本替换旧版本"
    procedure:
      - "完成一个最小可用版本"
      - "使用/测试，收集反馈"
      - "根据反馈识别改进点"
      - "生成新版本替代旧版本"
      - "重复，直到满足目标"
    preconditions: [有反馈来源, 愿意接受不完美的初始版本]
    output: "经过多轮改进的成熟产物"
    anti_patterns:
      - "不迭代（一次做到完美——幻觉）"
      - "迭代但不替代（改了但不用新版本）"
      - "无反馈迭代（闭门改进，不听外部信号）"
    activation: "当面对不确定性高、需要逐步探索的任务时——这是 Thinker 自身进化的核心动词"
