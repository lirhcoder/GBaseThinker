# GBaseThinker 元动词库
# 版本: 0.1.0
# 描述思维过程本身的动词——Thinker 用来"思考思考"的工具

verbs:

  抽象:
    decompose: [抽, 象]
    meaning:
      抽: "抽取——从具体中抽出关键要素"
      象: "象征——用简化的形式代表复杂的原物"
    procedure:
      - "面对多个具体实例"
      - "抽取：找到它们共有的核心要素"
      - "丢弃：去掉各自特有的细节"
      - "象征：用一个简化形式代表所有实例"
      - "验证：这个抽象是否丢掉了关键信息"
    preconditions: [有多个具体实例, 有简化的需求]
    output: "一个解释力强的抽象概念或模型"
    anti_patterns:
      - "过度抽象（丢掉了关键细节——空洞）"
      - "伪抽象（换了个名字但没简化——术语堆砌）"
      - "抽象泄漏（抽象掩盖了重要的底层差异）"
    activation: "当需要从多个具体案例中提炼通用规律时"

  类比:
    decompose: [类, 比]
    meaning:
      类: "归类——找到不同事物的相似性"
      比: "对比——在相似中发现映射关系"
    procedure:
      - "识别源域（已理解的领域）和目标域（要理解的领域）"
      - "类：找到两个域的结构相似性"
      - "比：建立元素间的映射关系"
      - "迁移：将源域的知识沿映射传递到目标域"
      - "检查：映射在哪里断裂（类比的边界）"
    preconditions: [有一个已理解的源域, 源域和目标域有结构相似性]
    output: "对目标域的新理解 + 类比的适用边界"
    anti_patterns:
      - "表面类比（只有表面相似，结构不同）"
      - "忽略断裂点（类比在某处不成立但继续推）"
      - "类比当证明（类比只能启发，不能证明）"
    activation: "当面对陌生领域，想借助已知领域的知识来理解时——这是 Thinker 跨学科思考的核心工具"

  假设:
    decompose: [假, 设]
    meaning:
      假: "假装——暂时接受一个未证实的前提"
      设: "设定——将它作为推理的起点"
    procedure:
      - "明确假设的内容（我暂时接受什么为真）"
      - "标记为假设（不是事实，是临时脚手架）"
      - "基于假设展开推理"
      - "检查推理结果是否合理"
      - "设计验证方法（如何证实或证伪这个假设）"
    preconditions: [有不确定性, 需要前进但信息不足]
    output: "一个可验证的假设 + 基于假设的推理链 + 验证计划"
    anti_patterns:
      - "假设变信念（忘了它是假设，当成事实）"
      - "不可证伪假设（怎么测都不影响结论——没用）"
      - "过多假设堆叠（假设套假设，整个推理链脆弱）"
    activation: "当信息不足但需要继续推进时——Thinker 的预测机制就是结构化的假设"

  综合:
    decompose: [综, 合]
    meaning:
      综: "纵览——将分散的线索编织在一起"
      合: "合并——形成一个统一的整体"
    procedure:
      - "收集所有相关的分析结果和信息片段"
      - "综：找到它们之间的关系（互补？矛盾？独立？）"
      - "合：将互补的部分合并，标注矛盾的部分"
      - "形成一个统一的叙事或模型"
      - "检查：有没有重要信息在综合中被丢失"
    preconditions: [有多个分散的分析结果, 需要形成统一判断]
    output: "一个统一的、考虑了多个视角的综合判断"
    anti_patterns:
      - "伪综合（只是并列，没有真正整合）"
      - "强行统一（把矛盾的部分硬捏在一起）"
      - "综合偏倚（某些信息权重过高）"
    activation: "当分析完各个部分，需要形成全局判断时"

  迁移:
    decompose: [迁, 移]
    meaning:
      迁: "搬迁——将知识从一个领域搬到另一个"
      移: "移植——让知识在新领域扎根"
    procedure:
      - "识别源领域的核心原理（不是具体做法，是底层逻辑）"
      - "分析目标领域的约束和特点"
      - "迁：将核心原理从源领域提取出来"
      - "移：调整原理以适应目标领域的约束"
      - "验证：迁移后的原理在目标领域是否有效"
    preconditions: [有可迁移的核心原理, 源和目标领域有结构相似性]
    output: "在新领域生效的知识 + 迁移的适用边界"
    anti_patterns:
      - "照搬（不调整就直接用——水土不服）"
      - "只迁不移（搬过来但不落地）"
      - "迁移了错误的层次（搬了具体做法而非底层原理）"
    activation: "当需要将一个领域的经验应用到另一个领域时——这是信念 B003（交叉知识最有价值）的执行工具"

  建模:
    decompose: [建, 模]
    meaning:
      建: "建立——创造一个结构"
      模: "模型——对现实的简化表示"
    procedure:
      - "明确建模目的（想理解什么/预测什么）"
      - "选择抽象层次（太细没用，太粗失真）"
      - "识别关键变量和它们的关系"
      - "构建模型（方程/图/叙事/代码）"
      - "用已知数据检验模型"
      - "标注模型的适用边界和已知缺陷"
    preconditions: [有建模目的, 有足够的观察数据]
    output: "一个有解释力和预测力的模型 + 适用边界"
    anti_patterns:
      - "模型即现实（忘了模型是简化——所有模型都是错的，有些有用）"
      - "过拟合（模型太贴合已知数据，无法泛化）"
      - "无目的建模（不知道为什么建模就开始）"
    activation: "当需要理解一个复杂系统或做出预测时——Thinker 的世界观本身就是一个模型"
